<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>躲避球冲刺 - 布局优化版</title>
    <style>
        :root {
            --bg: #0f172a;    
            --finish: #fbbf24;
            --red: #ff4444;    
            --yellow: #ffb700; 
            --green: #22c55e;  
            --ui-height: 80px; /* 顶部 UI 预留高度 */
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg);
            font-family: "Microsoft YaHei", sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 600px;
            background: #111827;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        
        /* 顶部状态栏优化 */
        #ui-header {
            height: var(--ui-height);
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid #334155;
            z-index: 10;
        }
        .ui-group {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .ui-text {
            font-size: 1rem;
            font-weight: bold;
            margin: 2px 0;
        }
        #hp-display {
            color: var(--green);
            font-size: 1.2rem;
        }

        /* 游戏画布区域 */
        #canvas-wrapper {
            flex: 1;
            position: relative;
            width: 100%;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* 进度条 */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            z-index: 5;
        }
        #progress-fill { 
            width: 0%; 
            height: 100%; 
            background: #3b82f6;
            transition: width 0.3s;
        }

        /* 底部控制按钮 */
        #mobile-controls {
            display: flex;
            width: 100%;
            height: 120px;
            background: #020617;
            border-top: 2px solid #334155;
        }
        .control-btn {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            color: white;
            -webkit-user-select: none;
            user-select: none;
            cursor: pointer;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .control-btn:active {
            background: #1e293b;
        }

        /* 弹窗样式 */
        #message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.98);
            border: 2px solid white;
            padding: 25px;
            text-align: center;
            display: none;
            z-index: 100;
            width: 85%;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 12px;
        }
        button {
            background: white;
            color: black;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            border-radius: 6px;
            margin-top: 15px;
        }
        
        #leaderboard {
            margin-top: 20px;
            text-align: left;
            border-top: 1px solid #475569;
            padding-top: 15px;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background: #1e293b;
            border: 1px solid #475569;
            color: white;
            text-align: center;
            margin: 10px 0;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-header">
        <div class="ui-group">
            <div class="ui-text">当前关卡: <span id="level-val">1</span></div>
            <div id="hp-display" class="ui-text">HP: <span id="hp-val">3</span></div>
        </div>
        <div class="ui-group" style="text-align: right">
            <div class="ui-text">剩余波数</div>
            <div class="ui-text" style="font-size: 1.5rem; color: var(--finish);" id="waves-val">10</div>
        </div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="gameCanvas"></canvas>
        <div class="progress-bar">
            <div id="progress-fill"></div>
        </div>
    </div>

    <div id="mobile-controls">
        <div class="control-btn" id="btn-left">左 移</div>
        <div class="control-btn" id="btn-right">右 移</div>
    </div>

    <div id="message-box">
        <h1 id="msg-title" style="margin:0;">躲避球冲刺</h1>
        <p id="msg-body" style="color: #94a3b8; margin: 15px 0;">左右移动，生存到最后！</p>
        
        <div id="name-input-container" style="display: none;">
            <p style="color: var(--finish)">恭喜通关！请留下你的大名：</p>
            <input type="text" id="player-name" maxlength="8" placeholder="你的名字">
            <button id="submit-score-btn">提交成绩</button>
        </div>

        <div id="action-buttons">
            <button id="msg-btn">开始游戏</button>
        </div>

        <div id="leaderboard">
            <h4 style="margin: 0 0 10px 0; text-align: center;">全球排行榜 (HP 结余)</h4>
            <div id="leaderboard-list">加载中...</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // 初始化 Firebase
    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'dodgeball-dash-pro';

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const levelDisplay = document.getElementById('level-val');
    const wavesDisplay = document.getElementById('waves-val');
    const progressFill = document.getElementById('progress-fill');
    const hpValDisplay = document.getElementById('hp-val');
    const hpContainer = document.getElementById('hp-display');
    const messageBox = document.getElementById('message-box');
    const msgTitle = document.getElementById('msg-title');
    const msgBody = document.getElementById('msg-body');
    const msgBtn = document.getElementById('msg-btn');
    const leaderboardList = document.getElementById('leaderboard-list');
    const nameInputContainer = document.getElementById('name-input-container');
    const playerNameInput = document.getElementById('player-name');
    const submitScoreBtn = document.getElementById('submit-score-btn');
    const actionButtons = document.getElementById('action-buttons');

    let audioCtx = null;
    let bgmInterval = null;
    let user = null;
    const TOTAL_LANES = 10;
    
    let gameState = {
        level: 1,
        playerLane: 4, 
        health: 3, 
        levelStartHealth: 3,
        speed: 2.2,
        isRunning: false,
        obstacles: [],
        spawnInterval: 500, 
        wavesSpawned: 0,
        totalWaves: 10,
        finishLineY: -2000,
        shake: 0
    };

    const levelConfigs = [
        { speed: 3.0, waves: 10, spawnInterval: 480 },
        { speed: 3.5, waves: 15, spawnInterval: 460 },
        { speed: 4.0, waves: 20, spawnInterval: 440 },
        { speed: 4.5, waves: 25, spawnInterval: 420 },
        { speed: 5.0, waves: 30, spawnInterval: 400 },
        { speed: 5.5, waves: 35, spawnInterval: 380 },
        { speed: 6.0, waves: 40, spawnInterval: 360 },
        { speed: 6.5, waves: 45, spawnInterval: 340 },
        { speed: 7.0, waves: 50, spawnInterval: 320 },
        { speed: 8.5, waves: 60, spawnInterval: 300 }
    ];

    // --- Firebase Auth & Leaderboard ---
    const initAuth = async () => {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
        } else {
            await signInAnonymously(auth);
        }
    };

    onAuthStateChanged(auth, u => {
        user = u;
        if (user) loadLeaderboard();
    });

    initAuth();

    function loadLeaderboard() {
        if (!user) return;
        const scoresRef = collection(db, 'artifacts', appId, 'public', 'data', 'scores');
        onSnapshot(scoresRef, (snapshot) => {
            const scores = [];
            snapshot.forEach(doc => scores.push(doc.data()));
            scores.sort((a, b) => b.score - a.score);
            const top10 = scores.slice(0, 10);
            
            leaderboardList.innerHTML = top10.length ? '' : '<div style="text-align:center">暂无数据</div>';
            top10.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'leaderboard-item';
                div.innerHTML = `<span>${index + 1}. ${item.name || '匿名'}</span><span>HP: ${item.score}</span>`;
                leaderboardList.appendChild(div);
            });
        }, (err) => {
            leaderboardList.innerHTML = '<div style="text-align:center">加载失败</div>';
        });
    }

    async function submitScore() {
        if (!user) return;
        const name = playerNameInput.value.trim() || "匿名";
        const score = gameState.health;
        try {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'scores'), {
                name,
                score,
                timestamp: serverTimestamp(),
                uid: user.uid
            });
            nameInputContainer.style.display = 'none';
            actionButtons.style.display = 'block';
            msgBody.innerText = "成绩已提交至排行榜！";
        } catch (e) {
            msgBody.innerText = "提交异常，请检查网络。";
        }
    }

    submitScoreBtn.onclick = submitScore;

    // --- 游戏引擎 ---
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const g = audioCtx.createGain(); g.connect(audioCtx.destination);
        const osc = audioCtx.createOscillator();
        if (type === 'red') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now);
            g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(); osc.stop(now + 0.2);
        } else if (type === 'yellow') {
            osc.frequency.setValueAtTime(250, now);
            g.gain.setValueAtTime(0.1, now); g.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(); osc.stop(now + 0.1);
        } else if (type === 'green') {
            osc.frequency.setValueAtTime(600, now);
            g.gain.setValueAtTime(0.15, now); g.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(); osc.stop(now + 0.1);
        }
        osc.connect(g);
    }

    function resize() { 
        const wrapper = document.getElementById('canvas-wrapper');
        canvas.width = wrapper.clientWidth; 
        canvas.height = wrapper.clientHeight; 
    }
    window.addEventListener('resize', resize);
    resize();

    function spawnWave() {
        if (gameState.wavesSpawned >= gameState.totalWaves) return;
        let count = (gameState.level < 4) ? 4 : (gameState.level < 8 ? 5 : 6);
        const lanes = Array.from({length: TOTAL_LANES}, (_, i) => i).sort(() => Math.random() - 0.5);
        lanes.slice(0, count).forEach(lane => {
            const r = Math.random();
            let type = 'red';
            if (r > 0.85) type = 'green';
            else if (r > 0.7) type = 'yellow';
            gameState.obstacles.push({ lane, y: -40, type });
        });
        gameState.wavesSpawned++;
        wavesDisplay.innerText = gameState.totalWaves - gameState.wavesSpawned;
        if (gameState.wavesSpawned === gameState.totalWaves) gameState.finishLineY = -1200;
    }

    function update() {
        if (!gameState.isRunning) return;
        if (gameState.wavesSpawned < gameState.totalWaves) {
            const lastY = gameState.obstacles.length > 0 ? Math.min(...gameState.obstacles.map(o => o.y)) : 1000;
            if (lastY > gameState.spawnInterval) spawnWave();
        }
        const laneW = canvas.width / TOTAL_LANES;
        const px = (gameState.playerLane + 0.5) * laneW;
        const py = canvas.height * 0.88;

        for (let i = gameState.obstacles.length - 1; i >= 0; i--) {
            const o = gameState.obstacles[i];
            o.y += gameState.speed;
            const ox = (o.lane + 0.5) * laneW;
            if (Math.hypot(px-ox, py-o.y) < 25) { 
                playSound(o.type);
                if (o.type === 'red') { gameState.health -= 3; gameState.shake = 12; }
                else if (o.type === 'yellow') { gameState.health -= 1; gameState.shake = 6; }
                else { gameState.health += 1; }
                gameState.obstacles.splice(i, 1);
                updateHPUI();
                if (gameState.health <= 0) { gameOver(); return; }
                continue;
            }
            if (o.y > canvas.height + 50) gameState.obstacles.splice(i, 1);
        }

        if (gameState.wavesSpawned === gameState.totalWaves) {
            gameState.finishLineY += gameState.speed;
            if (gameState.finishLineY > py) levelComplete();
        }
        progressFill.style.width = (gameState.wavesSpawned / gameState.totalWaves * 100) + '%';
    }

    function updateHPUI() {
        hpValDisplay.innerText = gameState.health;
        if (gameState.health <= 1) hpContainer.style.color = 'var(--red)';
        else if (gameState.health <= 2) hpContainer.style.color = 'var(--yellow)';
        else hpContainer.style.color = 'var(--green)';
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const laneW = canvas.width / TOTAL_LANES;
        
        // 绘制轨道线
        ctx.strokeStyle = 'rgba(255,255,255,0.04)';
        for(let i=1; i<TOTAL_LANES; i++) {
            ctx.beginPath(); ctx.moveTo(i*laneW, 0); ctx.lineTo(i*laneW, canvas.height); ctx.stroke();
        }

        // 终点线
        if (gameState.wavesSpawned === gameState.totalWaves) {
            ctx.fillStyle = 'var(--finish)';
            ctx.fillRect(0, gameState.finishLineY, canvas.width, 15);
        }

        // 玩家
        ctx.fillStyle = "#fff";
        ctx.shadowBlur = 10; ctx.shadowColor = "#fff";
        ctx.beginPath(); ctx.arc((gameState.playerLane + 0.5) * laneW, canvas.height * 0.88, 14, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;

        // 障碍物
        gameState.obstacles.forEach(o => {
            ctx.fillStyle = o.type === 'red' ? 'var(--red)' : (o.type === 'yellow' ? 'var(--yellow)' : 'var(--green)');
            ctx.beginPath(); ctx.arc((o.lane+0.5)*laneW, o.y, 14, 0, Math.PI*2); ctx.fill();
        });

        // 震动效果
        if (gameState.shake > 0) {
            const s = (Math.random()-0.5)*gameState.shake;
            canvas.style.transform = `translate(${s}px, ${s}px)`;
            gameState.shake *= 0.85;
        } else canvas.style.transform = 'none';
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

    function initLevel(lvl, keepHealth = false) {
        initAudio();
        resize();
        const config = levelConfigs[lvl - 1] || levelConfigs[0];
        gameState.level = lvl;
        if (!keepHealth) gameState.health = (lvl === 1) ? 3 : gameState.levelStartHealth;
        gameState.levelStartHealth = gameState.health;
        gameState.speed = config.speed;
        gameState.totalWaves = config.waves;
        gameState.spawnInterval = config.spawnInterval;
        gameState.wavesSpawned = 0;
        gameState.obstacles = [];
        gameState.finishLineY = -2000;
        gameState.isRunning = true;
        
        levelDisplay.innerText = lvl;
        wavesDisplay.innerText = config.waves;
        updateHPUI();
        messageBox.style.display = 'none';
        nameInputContainer.style.display = 'none';
        actionButtons.style.display = 'block';
    }

    function gameOver() {
        gameState.isRunning = false;
        msgTitle.innerText = "任务失败"; msgTitle.style.color = "var(--red)";
        msgBody.innerText = `在第 ${gameState.level} 关陨落了。`;
        msgBtn.innerText = "重整旗鼓";
        messageBox.style.display = 'block';
        msgBtn.onclick = () => initLevel(1, false);
    }

    function levelComplete() {
        gameState.isRunning = false;
        if (gameState.level < 10) {
            msgTitle.innerText = "关卡突破！"; msgTitle.style.color = "var(--green)";
            msgBody.innerText = `下一关：第 ${gameState.level + 1} 关`;
            msgBtn.innerText = "进入下一关";
            messageBox.style.display = 'block';
            msgBtn.onclick = () => initLevel(gameState.level + 1, true);
        } else {
            msgTitle.innerText = "传奇诞生！"; msgTitle.style.color = "var(--finish)";
            msgBody.innerText = `你完成了全部挑战！剩余HP：${gameState.health}`;
            nameInputContainer.style.display = 'block';
            actionButtons.style.display = 'none';
            messageBox.style.display = 'block';
            msgBtn.innerText = "再玩一遍";
            msgBtn.onclick = () => initLevel(1, false);
        }
    }

    // 控制响应
    const moveL = (e) => { e.preventDefault(); initAudio(); if (gameState.playerLane > 0) gameState.playerLane--; };
    const moveR = (e) => { e.preventDefault(); initAudio(); if (gameState.playerLane < TOTAL_LANES - 1) gameState.playerLane++; };
    
    document.getElementById('btn-left').onpointerdown = moveL;
    document.getElementById('btn-right').onpointerdown = moveR;
    window.onkeydown = (e) => {
        if (!gameState.isRunning) return;
        if (e.key === 'ArrowLeft' || e.key === 'a') moveL(e);
        if (e.key === 'ArrowRight' || e.key === 'd') moveR(e);
    };

    msgBtn.onclick = () => initLevel(1, false);
    messageBox.style.display = 'block';
    gameLoop();
</script>
</body>
</html>
