<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>躲避球冲刺 - 音乐回归版</title>
    <style>
        :root { --primary: #ffffff; --bg: #0f172a; --finish: #fbbf24; --red: #ff4444; --yellow: #ffb700; --green: #22c55e; }
        body { margin: 0; padding: 0; overflow: hidden; background-color: var(--bg); font-family: sans-serif; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none; }
        #game-container { position: relative; width: 100%; height: 100%; max-width: 600px; background: #111827; display: flex; flex-direction: column; border: 2px solid #334155; }
        canvas { flex: 1; display: block; width: 100%; height: 100%; }
        #ui-overlay { position: absolute; top: 20px; left: 0; right: 0; pointer-events: none; display: flex; justify-content: space-between; padding: 0 20px; font-weight: bold; z-index: 5; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        #health-status { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
        #mobile-controls { display: flex; width: 100%; height: 120px; background: #020617; border-top: 2px solid #334155; }
        .control-btn { flex: 1; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; color: white; -webkit-user-select: none; user-select: none; cursor: pointer; font-weight: bold; }
        .control-btn:active { background: #1e293b; }
        #message-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e293b; border: 4px solid white; padding: 20px; text-align: center; display: none; z-index: 100; width: 85%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        button { background: white; color: black; border: none; padding: 12px; font-size: 1rem; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        input { width: 100%; padding: 10px; box-sizing: border-box; background: #0f172a; border: 1px solid #475569; color: white; text-align: center; margin-bottom: 10px; }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .progress-bar { position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%); width: 85%; height: 8px; background: #020617; border: 1px solid #475569; }
        #progress-fill { width: 0%; height: 100%; background: #3b82f6; transition: width 0.3s; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-overlay">
        <div>
            <div style="font-size: 0.7rem; color: #94a3b8;">关卡 <span id="level-val">1</span></div>
            <div id="health-status"><span id="health-num">3</span> HP</div>
        </div>
        <div style="text-align: right">
            <div style="font-size: 0.7rem; color: #94a3b8;">剩余波数</div>
            <div id="waves-val" style="font-size: 1.2rem;">10</div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <div id="mobile-controls">
        <div class="control-btn" id="btn-left">左 移</div>
        <div class="control-btn" id="btn-right">右 移</div>
    </div>
    <div id="message-box">
        <h2 id="msg-title">躲避球冲刺</h2>
        <p id="msg-body">每点血量 = 1分</p>
        
        <div id="name-input-container" style="display:none;">
            <input type="text" id="player-name" maxlength="10" placeholder="输入大名">
            <button id="submit-score-btn">提交成绩</button>
        </div>
        <div id="main-actions">
            <button id="msg-btn">开始挑战</button>
        </div>
        <div id="leaderboard" style="margin-top:15px; text-align:left; border-top:1px solid #444; padding-top:10px;">
            <div style="text-align:center; font-weight:bold; margin-bottom:5px;">全球排行榜</div>
            <div id="leaderboard-list">正在尝试连接服务器...</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // 初始化 Firebase 配置
    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'dodgeball-game-final';

    let user = null;
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const levelDisplay = document.getElementById('level-val');
    const wavesDisplay = document.getElementById('waves-val');
    const progressFill = document.getElementById('progress-fill');
    const healthNum = document.getElementById('health-num');
    const messageBox = document.getElementById('message-box');
    const msgTitle = document.getElementById('msg-title');
    const msgBody = document.getElementById('msg-body');
    const msgBtn = document.getElementById('msg-btn');
    const nameInputContainer = document.getElementById('name-input-container');
    const playerNameInput = document.getElementById('player-name');
    const submitBtn = document.getElementById('submit-score-btn');

    const levelConfigs = [
        { speed: 3.0, waves: 10, spawnInterval: 480 },
        { speed: 3.5, waves: 15, spawnInterval: 470 },
        { speed: 4.1, waves: 20, spawnInterval: 460 },
        { speed: 4.7, waves: 25, spawnInterval: 450 },
        { speed: 5.3, waves: 30, spawnInterval: 440 },
        { speed: 6.0, waves: 35, spawnInterval: 430 },
        { speed: 6.8, waves: 40, spawnInterval: 420 },
        { speed: 7.6, waves: 45, spawnInterval: 410 },
        { speed: 8.2, waves: 50, spawnInterval: 400 },
        { speed: 8.8, waves: 60, spawnInterval: 390 }
    ];

    // 认证流程
    async function initAuth() {
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        } catch (err) {
            console.error("Auth failed:", err);
            document.getElementById('leaderboard-list').innerHTML = "认证失败，请刷新重试";
        }
    }

    onAuthStateChanged(auth, u => {
        user = u;
        if (user) setupLeaderboardListener();
    });

    initAuth();

    // 实时排行榜监听
    function setupLeaderboardListener() {
        if (!db || !user) return;
        // 严格遵循路径规则
        const q = collection(db, 'artifacts', appId, 'public', 'data', 'scores');
        onSnapshot(q, (snap) => {
            const data = [];
            snap.forEach(doc => {
                const item = doc.data();
                if (item && typeof item.score === 'number') data.push(item);
            });
            // 简单内存排序
            data.sort((a,b) => b.score - a.score);
            
            const listEl = document.getElementById('leaderboard-list');
            if (data.length === 0) {
                listEl.innerHTML = "<div style='text-align:center;color:#666;'>暂无纪录，快来抢占沙发！</div>";
            } else {
                listEl.innerHTML = data.slice(0, 5).map((s, i) => 
                    `<div class="leaderboard-item"><span>${i+1}. ${s.name || '匿名'}</span><span>${s.score}分</span></div>`).join('');
            }
        }, (error) => {
            console.error("Snapshot error:", error);
            document.getElementById('leaderboard-list').innerHTML = "无法加载排行榜数据";
        });
    }

    let audioCtx = null;
    let bgmInterval = null;

    function initAudioContext() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function startBGM() {
        if (bgmInterval) clearInterval(bgmInterval);
        if (!audioCtx) return;
        
        const freqs = [261.63, 329.63, 392.00, 440.00, 523.25];
        function playNote() {
            if (!gameState.isRunning) return;
            const freq = freqs[Math.floor(Math.random() * freqs.length)];
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(0, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 0.5);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.0);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 2.0);
        }
        playNote();
        bgmInterval = setInterval(playNote, 1200);
    }

    function playSound(type) {
        initAudioContext();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'hit_major') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, now);
            gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(); osc.stop(now + 0.3);
        } else if (type === 'hit_minor') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(280, now);
            gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.15);
            osc.start(); osc.stop(now + 0.15);
        } else if (type === 'score') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(800, now);
            gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(); osc.stop(now + 0.1);
        } else if (type === 'win') {
            osc.frequency.setValueAtTime(523, now); osc.frequency.setValueAtTime(783, now + 0.15);
            gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.start(); osc.stop(now + 0.4);
        }
    }

    let gameState = { 
        level: 1, 
        playerLane: 4, 
        health: 3, 
        levelStartHealth: 3, 
        isRunning: false, 
        obstacles: [], 
        wavesSpawned: 0, 
        totalWaves: 10, 
        speed: 3, 
        spawnInterval: 480, 
        finishLineY: -2000 
    };

    function resize() { canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; }
    window.onresize = resize; resize();

    function moveLeft() { if(gameState.playerLane > 0) gameState.playerLane--; }
    function moveRight() { if(gameState.playerLane < 9) gameState.playerLane++; }

    window.addEventListener('keydown', (e) => {
        if (!gameState.isRunning) return;
        if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft();
        else if (e.key === 'ArrowRight' || e.key === 'd') moveRight();
    });

    function spawn() {
        if (gameState.wavesSpawned >= gameState.totalWaves) return;
        let count = 5;
        if (gameState.level >= 4 && gameState.level <= 8) count = 6;
        else if (gameState.level >= 9) count = 7;

        const shuffled = Array.from({length: 10}, (_, i) => i).sort(() => Math.random()-0.5);
        shuffled.slice(0, count).forEach(lane => {
            let type = 'red'; const r = Math.random();
            if (r > 0.8) type = 'green'; else if (r > 0.65) type = 'yellow';
            gameState.obstacles.push({ lane, y: -50, type });
        });
        gameState.wavesSpawned++;
        wavesDisplay.innerText = Math.max(0, gameState.totalWaves - gameState.wavesSpawned);
        if (gameState.wavesSpawned === gameState.totalWaves) gameState.finishLineY = -1000;
    }

    function update() {
        if (!gameState.isRunning) return;
        const lastY = gameState.obstacles.length ? Math.min(...gameState.obstacles.map(o => o.y)) : 1000;
        if (lastY > gameState.spawnInterval && gameState.wavesSpawned < gameState.totalWaves) spawn();

        const lw = canvas.width / 10;
        const px = (gameState.playerLane + 0.5) * lw;
        const py = canvas.height * 0.85;

        for (let i = gameState.obstacles.length-1; i>=0; i--) {
            const o = gameState.obstacles[i]; o.y += gameState.speed;
            const ox = (o.lane + 0.5) * lw;
            if (Math.hypot(px-ox, py-o.y) < 25) {
                if (o.type === 'red') { gameState.health -= 3; playSound('hit_major'); } 
                else if (o.type === 'yellow') { gameState.health -= 1; playSound('hit_minor'); } 
                else { gameState.health += 1; playSound('score'); }
                gameState.obstacles.splice(i, 1);
                healthNum.innerText = gameState.health;
                if (gameState.health <= 0) {
                    gameState.isRunning = false; 
                    if(bgmInterval) clearInterval(bgmInterval);
                    playSound('hit_major');
                    msgTitle.innerText = "游戏结束"; 
                    msgBody.innerText = `关卡 ${gameState.level} 挑战失败。`; 
                    messageBox.style.display = 'block';
                    msgBtn.innerText = "回滚重试";
                    msgBtn.onclick = () => start(gameState.level, false);
                }
            }
            if (o.y > canvas.height + 50) gameState.obstacles.splice(i, 1);
        }

        if (gameState.wavesSpawned === gameState.totalWaves) {
            gameState.finishLineY += gameState.speed;
            if (gameState.finishLineY > py && gameState.obstacles.length === 0) {
                if (gameState.level < 10) {
                    gameState.isRunning = false; 
                    if(bgmInterval) clearInterval(bgmInterval);
                    playSound('win');
                    msgTitle.innerText = "关卡通过"; 
                    msgBody.innerText = `进入第 ${gameState.level + 1} 关前已存档生命值：${gameState.health}`;
                    msgBtn.innerText = "下一关"; messageBox.style.display = 'block';
                    msgBtn.onclick = () => start(gameState.level + 1, true);
                } else {
                    gameState.isRunning = false; 
                    if(bgmInterval) clearInterval(bgmInterval);
                    playSound('win');
                    msgTitle.innerText = "挑战达成！"; 
                    msgBody.innerText = `最终成就点数: ${gameState.health}分`;
                    nameInputContainer.style.display = 'block'; 
                    document.getElementById('main-actions').style.display = 'none';
                    messageBox.style.display = 'block';
                }
            }
        }
        progressFill.style.width = (gameState.wavesSpawned / gameState.totalWaves * 100) + '%';
    }

    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        const lw = canvas.width/10;
        ctx.strokeStyle = '#222'; for(let i=1; i<10; i++){ ctx.beginPath(); ctx.moveTo(i*lw,0); ctx.lineTo(i*lw,canvas.height); ctx.stroke(); }
        
        if (gameState.wavesSpawned === gameState.totalWaves) {
            ctx.fillStyle = 'var(--finish)'; ctx.fillRect(0, gameState.finishLineY, canvas.width, 20);
        }

        ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc((gameState.playerLane+0.5)*lw, canvas.height*0.85, 15, 0, Math.PI*2); ctx.fill();
        gameState.obstacles.forEach(o => {
            ctx.fillStyle = o.type === 'red' ? '#ff4444' : (o.type === 'yellow' ? '#ffb700' : '#22c55e');
            ctx.beginPath(); ctx.arc((o.lane+0.5)*lw, o.y, 15, 0, Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(() => { update(); draw(); });
    }

    function start(lvl = 1, isNextLevel = false) {
        initAudioContext();
        const config = levelConfigs[lvl - 1] || levelConfigs[0];
        
        if (lvl === 1) {
            gameState.health = 3;
            gameState.levelStartHealth = 3;
        } else if (isNextLevel) {
            gameState.levelStartHealth = gameState.health;
        } else {
            gameState.health = gameState.levelStartHealth;
        }

        gameState.level = lvl;
        gameState.playerLane = 4;
        gameState.isRunning = true;
        gameState.obstacles = [];
        gameState.wavesSpawned = 0;
        gameState.totalWaves = config.waves;
        gameState.speed = config.speed;
        gameState.spawnInterval = config.spawnInterval;
        gameState.finishLineY = -2000;

        levelDisplay.innerText = lvl; 
        healthNum.innerText = gameState.health;
        wavesDisplay.innerText = config.waves;
        messageBox.style.display = 'none';
        document.getElementById('main-actions').style.display='block';
        nameInputContainer.style.display = 'none';
        
        startBGM();
    }

    msgBtn.onclick = () => start(1);
    document.getElementById('btn-left').onpointerdown = (e) => { e.preventDefault(); moveLeft(); };
    document.getElementById('btn-right').onpointerdown = (e) => { e.preventDefault(); moveRight(); };
    
    // 提交成绩逻辑
    submitBtn.onclick = async () => {
        if (!user || !db) return;
        const name = playerNameInput.value.trim() || "匿名玩家";
        const score = gameState.health;
        
        try {
            submitBtn.disabled = true;
            submitBtn.innerText = "提交中...";
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'scores'), { 
                name, 
                score: score, 
                timestamp: serverTimestamp(), 
                uid: user.uid
            });
            nameInputContainer.style.display = 'none';
            msgBody.innerText = "成绩已成功上传至云端排行榜！";
            document.getElementById('main-actions').style.display='block';
            msgBtn.innerText = "回主菜单";
            msgBtn.onclick = () => location.reload();
        } catch (e) {
            console.error("Submit error:", e);
            submitBtn.disabled = false;
            submitBtn.innerText = "提交失败，再试一次";
        }
    };

    messageBox.style.display = 'block';
    draw();
</script>
</body>
</html>
