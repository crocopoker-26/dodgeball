<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>躲避球冲刺 - 腾讯云开发版</title>
    <style>
        :root { --primary: #ffffff; --bg: #0f172a; --finish: #fbbf24; --red: #ff4444; --yellow: #ffb700; --green: #22c55e; }
        body { margin: 0; padding: 0; overflow: hidden; background-color: var(--bg); font-family: sans-serif; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none; }
        #game-container { position: relative; width: 100%; height: 100%; max-width: 600px; background: #111827; display: flex; flex-direction: column; border: 2px solid #334155; }
        canvas { flex: 1; display: block; width: 100%; height: 100%; }
        #ui-overlay { position: absolute; top: 20px; left: 0; right: 0; pointer-events: none; display: flex; justify-content: space-between; padding: 0 20px; font-weight: bold; z-index: 5; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        #health-status { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
        #mobile-controls { display: flex; width: 100%; height: 120px; background: #020617; border-top: 2px solid #334155; }
        .control-btn { flex: 1; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; color: white; user-select: none; cursor: pointer; font-weight: bold; }
        .control-btn:active { background: #1e293b; }
        #message-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e293b; border: 4px solid white; padding: 20px; text-align: center; display: none; z-index: 100; width: 85%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        button { background: white; color: black; border: none; padding: 12px; font-size: 1rem; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        input { width: 100%; padding: 10px; box-sizing: border-box; background: #0f172a; border: 1px solid #475569; color: white; text-align: center; margin-bottom: 10px; }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .progress-bar { position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%); width: 85%; height: 8px; background: #020617; border: 1px solid #475569; }
        #progress-fill { width: 0%; height: 100%; background: #3b82f6; transition: width 0.3s; }
    </style>
    <!-- 引入腾讯云开发 SDK -->
    <script src="https://imgcache.qq.com/qcloud/tcbjs/1.10.8/tcb.js"></script>
</head>
<body>

<div id="game-container">
    <div id="ui-overlay">
        <div>
            <div style="font-size: 0.7rem; color: #94a3b8;">关卡 <span id="level-val">1</span></div>
            <div id="health-status"><span id="health-num">3</span> HP</div>
        </div>
        <div style="text-align: right">
            <div style="font-size: 0.7rem; color: #94a3b8;">剩余波数</div>
            <div id="waves-val" style="font-size: 1.2rem;">10</div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <div id="mobile-controls">
        <div class="control-btn" id="btn-left">左 移</div>
        <div class="control-btn" id="btn-right">右 移</div>
    </div>
    <div id="message-box">
        <h2 id="msg-title">躲避球冲刺</h2>
        <p id="msg-body">腾讯云开发加速版</p>
        
        <div id="name-input-container" style="display:none;">
            <input type="text" id="player-name" maxlength="10" placeholder="输入大名">
            <button id="submit-score-btn">提交成绩</button>
        </div>
        <div id="main-actions">
            <button id="msg-btn">开始挑战</button>
        </div>
        <div id="leaderboard" style="margin-top:15px; text-align:left; border-top:1px solid #444; padding-top:10px;">
            <div style="text-align:center; font-weight:bold; margin-bottom:5px;">排行榜</div>
            <div id="leaderboard-list">正在加载数据...</div>
        </div>
    </div>
</div>

<script>
    /**
     * 腾讯云开发初始化配置
     */
    const envId = 'YOUR-ENV-ID'; // 替换为你在腾讯云控制台申请的云环境 ID
    const tcbApp = tcb.init({ env: envId });
    const auth = tcbApp.auth();
    const db = tcbApp.database();

    let user = null;

    async function initCloud() {
        try {
            // 匿名登录
            const loginState = await auth.anonymousAuthProvider().signIn();
            user = loginState.user;
            loadLeaderboard();
        } catch (err) {
            console.error("云开发连接失败:", err);
            document.getElementById('leaderboard-list').innerHTML = "国内环境请先配置云环境 ID";
        }
    }

    function loadLeaderboard() {
        // 腾讯云开发实时监听 API：watch()
        db.collection('scores')
            .orderBy('score', 'desc')
            .limit(10)
            .watch({
                onChange: (snapshot) => {
                    const data = snapshot.docs;
                    document.getElementById('leaderboard-list').innerHTML = data.map((s, i) => 
                        `<div class="leaderboard-item"><span>${i+1}. ${s.name || '匿名'}</span><span>${s.score}分</span></div>`).join('') || "暂无记录";
                },
                onError: (err) => {
                    console.error('监听失败', err);
                }
            });
    }

    async function submitToTCB(name, score) {
        try {
            await db.collection('scores').add({
                name: name,
                score: score,
                createTime: db.serverDate()
            });
            return true;
        } catch (err) {
            console.error("提交失败", err);
            return false;
        }
    }

    initCloud();

    // --- 游戏逻辑部分 ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const levelDisplay = document.getElementById('level-val');
    const wavesDisplay = document.getElementById('waves-val');
    const progressFill = document.getElementById('progress-fill');
    const healthNum = document.getElementById('health-num');
    const messageBox = document.getElementById('message-box');
    const msgTitle = document.getElementById('msg-title');
    const msgBody = document.getElementById('msg-body');
    const msgBtn = document.getElementById('msg-btn');
    const nameInputContainer = document.getElementById('name-input-container');
    const playerNameInput = document.getElementById('player-name');
    const submitBtn = document.getElementById('submit-score-btn');

    const levelConfigs = [
        { speed: 3.0, waves: 10, spawnInterval: 480 },
        { speed: 3.5, waves: 15, spawnInterval: 470 },
        { speed: 4.1, waves: 20, spawnInterval: 460 },
        { speed: 4.7, waves: 25, spawnInterval: 450 },
        { speed: 5.3, waves: 30, spawnInterval: 440 },
        { speed: 6.0, waves: 35, spawnInterval: 430 },
        { speed: 6.8, waves: 40, spawnInterval: 420 },
        { speed: 7.6, waves: 45, spawnInterval: 410 },
        { speed: 8.2, waves: 50, spawnInterval: 400 },
        { speed: 8.8, waves: 60, spawnInterval: 390 }
    ];

    let audioCtx = null;
    let bgmInterval = null;

    function initAudioContext() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
        initAudioContext();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        if (type === 'hit_major') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, now);
            gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(); osc.stop(now + 0.3);
        } else if (type === 'win') {
            osc.frequency.setValueAtTime(523, now); osc.frequency.setValueAtTime(783, now + 0.15);
            gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.start(); osc.stop(now + 0.4);
        }
    }

    let gameState = { 
        level: 1, playerLane: 4, health: 3, levelStartHealth: 3, 
        isRunning: false, obstacles: [], wavesSpawned: 0, 
        totalWaves: 10, speed: 3, spawnInterval: 480, finishLineY: -2000 
    };

    function resize() { canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; }
    window.onresize = resize; resize();

    function moveLeft() { if(gameState.playerLane > 0) gameState.playerLane--; }
    function moveRight() { if(gameState.playerLane < 9) gameState.playerLane++; }

    window.addEventListener('keydown', (e) => {
        if (!gameState.isRunning) return;
        if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft();
        else if (e.key === 'ArrowRight' || e.key === 'd') moveRight();
    });

    function spawn() {
        if (gameState.wavesSpawned >= gameState.totalWaves) return;
        const count = gameState.level < 5 ? 5 : 6;
        const shuffled = Array.from({length: 10}, (_, i) => i).sort(() => Math.random()-0.5);
        shuffled.slice(0, count).forEach(lane => {
            let type = 'red'; const r = Math.random();
            if (r > 0.8) type = 'green'; else if (r > 0.65) type = 'yellow';
            gameState.obstacles.push({ lane, y: -50, type });
        });
        gameState.wavesSpawned++;
        wavesDisplay.innerText = gameState.totalWaves - gameState.wavesSpawned;
        if (gameState.wavesSpawned === gameState.totalWaves) gameState.finishLineY = -1000;
    }

    function update() {
        if (!gameState.isRunning) return;
        const lastY = gameState.obstacles.length ? Math.min(...gameState.obstacles.map(o => o.y)) : 1000;
        if (lastY > gameState.spawnInterval && gameState.wavesSpawned < gameState.totalWaves) spawn();

        const lw = canvas.width / 10;
        const px = (gameState.playerLane + 0.5) * lw;
        const py = canvas.height * 0.85;

        for (let i = gameState.obstacles.length-1; i>=0; i--) {
            const o = gameState.obstacles[i]; o.y += gameState.speed;
            const ox = (o.lane + 0.5) * lw;
            if (Math.hypot(px-ox, py-o.y) < 25) {
                if (o.type === 'red') gameState.health -= 3;
                else if (o.type === 'yellow') gameState.health -= 1;
                else gameState.health += 1;
                gameState.obstacles.splice(i, 1);
                healthNum.innerText = gameState.health;
                if (gameState.health <= 0) {
                    gameState.isRunning = false; playSound('hit_major');
                    msgTitle.innerText = "游戏结束"; messageBox.style.display = 'block';
                    msgBtn.innerText = "回滚重试"; msgBtn.onclick = () => start(gameState.level);
                }
            }
            if (o.y > canvas.height + 50) gameState.obstacles.splice(i, 1);
        }

        if (gameState.wavesSpawned === gameState.totalWaves) {
            gameState.finishLineY += gameState.speed;
            if (gameState.finishLineY > py && gameState.obstacles.length === 0) {
                if (gameState.level < 10) {
                    gameState.isRunning = false; playSound('win');
                    msgTitle.innerText = "通关！"; msgBtn.innerText = "下一关";
                    messageBox.style.display = 'block';
                    msgBtn.onclick = () => start(gameState.level + 1, true);
                } else {
                    gameState.isRunning = false; playSound('win');
                    msgTitle.innerText = "恭喜登顶！"; 
                    nameInputContainer.style.display = 'block';
                    document.getElementById('main-actions').style.display='none';
                    messageBox.style.display = 'block';
                }
            }
        }
        progressFill.style.width = (gameState.wavesSpawned / gameState.totalWaves * 100) + '%';
    }

    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        const lw = canvas.width/10;
        ctx.strokeStyle = '#222'; 
        for(let i=1; i<10; i++){ ctx.beginPath(); ctx.moveTo(i*lw,0); ctx.lineTo(i*lw,canvas.height); ctx.stroke(); }
        
        if (gameState.wavesSpawned === gameState.totalWaves) {
            ctx.fillStyle = 'var(--finish)'; ctx.fillRect(0, gameState.finishLineY, canvas.width, 20);
        }

        ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc((gameState.playerLane+0.5)*lw, canvas.height*0.85, 15, 0, Math.PI*2); ctx.fill();
        gameState.obstacles.forEach(o => {
            ctx.fillStyle = o.type === 'red' ? '#ff4444' : (o.type === 'yellow' ? '#ffb700' : '#22c55e');
            ctx.beginPath(); ctx.arc((o.lane+0.5)*lw, o.y, 15, 0, Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(() => { update(); draw(); });
    }

    function start(lvl = 1, isNext = false) {
        initAudioContext();
        const config = levelConfigs[lvl - 1] || levelConfigs[0];
        if (lvl === 1) gameState.health = 3;
        else if (isNext) gameState.levelStartHealth = gameState.health;
        else gameState.health = gameState.levelStartHealth;

        gameState.level = lvl; gameState.isRunning = true;
        gameState.obstacles = []; gameState.wavesSpawned = 0;
        gameState.totalWaves = config.waves; gameState.speed = config.speed;
        gameState.spawnInterval = config.spawnInterval; gameState.finishLineY = -2000;

        levelDisplay.innerText = lvl; healthNum.innerText = gameState.health;
        wavesDisplay.innerText = config.waves;
        messageBox.style.display = 'none';
        document.getElementById('main-actions').style.display='block';
        nameInputContainer.style.display = 'none';
    }

    msgBtn.onclick = () => start(1);
    document.getElementById('btn-left').onpointerdown = (e) => { e.preventDefault(); moveLeft(); };
    document.getElementById('btn-right').onpointerdown = (e) => { e.preventDefault(); moveRight(); };
    
    submitBtn.onclick = async () => {
        const name = playerNameInput.value.trim() || "匿名";
        const success = await submitToTCB(name, gameState.health);
        if (success) {
            msgBody.innerText = "提交成功！";
            nameInputContainer.style.display = 'none';
            document.getElementById('main-actions').style.display = 'block';
            msgBtn.innerText = "再玩一次";
            msgBtn.onclick = () => location.reload();
        } else {
            alert("提交失败，请检查环境 ID 或安全域名配置。");
        }
    };

    messageBox.style.display = 'block';
    draw();
</script>
</body>
</html>
