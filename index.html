<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>躲避球冲刺 - 10关挑战</title>
    <style>
        :root {
            --bg: #0f172a;    
            --finish: #ffffff;
            --red: #ff4444;    
            --yellow: #ffb700; 
            --green: #22c55e;  
            --blue: #3b82f6;
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg);
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 600px;
            background: #111827;
            display: flex;
            flex-direction: column;
            border: 2px solid #334155;
        }
        canvas {
            flex: 1;
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 5;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .ui-text {
            font-size: 1.1rem;
            font-weight: bold;
        }
        #hp-display {
            color: var(--green);
            margin-top: 5px;
        }

        #mobile-controls {
            display: flex;
            width: 100%;
            height: 100px;
            background: #020617;
            border-top: 2px solid #334155;
        }
        .control-btn {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.3rem;
            color: white;
            -webkit-user-select: none;
            user-select: none;
            cursor: pointer;
            font-weight: bold;
        }
        .control-btn:active {
            background: #1e293b;
        }

        #message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.98);
            border: 3px solid white;
            padding: 40px 20px;
            text-align: center;
            display: none;
            z-index: 100;
            width: 80%;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border-radius: 12px;
        }
        #msg-progress-tag {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 0.9rem;
            color: #94a3b8;
            font-weight: bold;
        }
        #msg-title {
            margin: 0;
            font-size: 2.2rem;
            letter-spacing: 2px;
            color: var(--blue);
        }
        #msg-body {
            margin: 20px 0;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #94a3b8;
        }
        .rule-item {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 5px 0;
            font-size: 0.95rem;
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        button {
            background: white;
            color: black;
            border: none;
            padding: 15px 45px;
            font-size: 1.3rem;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            border-radius: 8px;
            transition: transform 0.1s;
        }
        button:active { 
            background: #cbd5e1;
            transform: scale(0.95);
        }

        .progress-bar {
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        #progress-fill { 
            width: 0%; 
            height: 100%; 
            background: var(--blue);
            transition: width 0.3s ease-out;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-overlay">
        <div>
            <div class="ui-text">进度: <span id="level-val">1</span> / 10</div>
            <div id="hp-display" class="ui-text">HP: <span id="hp-val">3</span></div>
        </div>
        <div style="text-align: right">
            <div class="ui-text">剩余波数: <span id="waves-val">10</span></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="progress-bar">
        <div id="progress-fill"></div>
    </div>

    <div id="mobile-controls">
        <div class="control-btn" id="btn-left">左 移</div>
        <div class="control-btn" id="btn-right">右 移</div>
    </div>

    <div id="message-box">
        <div id="msg-progress-tag"></div>
        <h1 id="msg-title">第 1 / 10 关</h1>
        <div id="msg-body"></div>
        <button id="msg-btn">开始挑战</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const levelDisplay = document.getElementById('level-val');
    const wavesDisplay = document.getElementById('waves-val');
    const progressFill = document.getElementById('progress-fill');
    const hpValDisplay = document.getElementById('hp-val');
    const hpContainer = document.getElementById('hp-display');
    const messageBox = document.getElementById('message-box');
    const msgTitle = document.getElementById('msg-title');
    const msgBody = document.getElementById('msg-body');
    const msgBtn = document.getElementById('msg-btn');
    const msgProgressTag = document.getElementById('msg-progress-tag');

    let audioCtx = null;
    let bgmInterval = null;
    const TOTAL_LANES = 10;
    
    let gameState = {
        level: 1,
        playerLane: 4, 
        health: 3, 
        levelStartHealth: 3,
        speed: 2.2,
        isRunning: false,
        obstacles: [],
        spawnInterval: 500, 
        wavesSpawned: 0,
        totalWaves: 10,
        finishLineY: -2000,
        shake: 0
    };

    const levelConfigs = [
        { speed: 3.5, waves: 8, spawnInterval: 480 },
        { speed: 4.0, waves: 12, spawnInterval: 470 },
        { speed: 4.6, waves: 16, spawnInterval: 460 },
        { speed: 5.2, waves: 20, spawnInterval: 450 },
        { speed: 5.8, waves: 25, spawnInterval: 440 },
        { speed: 6.4, waves: 30, spawnInterval: 430 },
        { speed: 7.0, waves: 35, spawnInterval: 420 },
        { speed: 7.6, waves: 40, spawnInterval: 410 },
        { speed: 8.2, waves: 45, spawnInterval: 400 },
        { speed: 9.0, waves: 50, spawnInterval: 380 }
    ];

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function startBGM() {
        if (bgmInterval) clearInterval(bgmInterval);
        if (!audioCtx) return;
        
        const freqs = [261.63, 329.63, 392.00, 440.00, 523.25];
        function playNote() {
            if (!gameState.isRunning) return;
            const freq = freqs[Math.floor(Math.random() * freqs.length)];
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(0, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 0.5);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.0);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 2.0);
        }
        playNote();
        bgmInterval = setInterval(playNote, 1200);
    }

    function playSound(type) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const g = audioCtx.createGain(); 
        g.connect(audioCtx.destination);
        const osc = audioCtx.createOscillator();
        
        if (type === 'red') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(120, now);
            g.gain.setValueAtTime(0.3, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(); osc.stop(now + 0.3);
        } else if (type === 'yellow') {
            osc.frequency.setValueAtTime(300, now);
            g.gain.setValueAtTime(0.1, now); g.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(); osc.stop(now + 0.1);
        } else if (type === 'green') {
            osc.frequency.setValueAtTime(500, now);
            g.gain.setValueAtTime(0.2, now); g.gain.linearRampToValueAtTime(0, now + 0.15);
            osc.start(); osc.stop(now + 0.15);
        }
        osc.connect(g);
    }

    function moveLeft() { if (gameState.playerLane > 0) gameState.playerLane--; }
    function moveRight() { if (gameState.playerLane < TOTAL_LANES - 1) gameState.playerLane++; }

    document.getElementById('btn-left').onpointerdown = (e) => { e.preventDefault(); initAudio(); moveLeft(); };
    document.getElementById('btn-right').onpointerdown = (e) => { e.preventDefault(); initAudio(); moveRight(); };

    window.addEventListener('keydown', (e) => {
        if (!gameState.isRunning) return;
        initAudio();
        if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') moveLeft();
        else if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') moveRight();
    });

    function updateHP() {
        hpValDisplay.innerText = gameState.health;
        if (gameState.health <= 1) {
            hpContainer.style.color = 'var(--red)';
        } else if (gameState.health <= 2) {
            hpContainer.style.color = 'var(--yellow)';
        } else {
            hpContainer.style.color = 'var(--green)';
        }
    }

    function resize() { 
        canvas.width = canvas.clientWidth; 
        canvas.height = canvas.clientHeight; 
    }
    window.addEventListener('resize', resize);
    resize();

    function spawnWave() {
        if (gameState.wavesSpawned >= gameState.totalWaves) return;
        let count = (gameState.level < 4) ? 5 : (gameState.level < 9 ? 6 : 7);

        const shuffled = Array.from({length: TOTAL_LANES}, (_, i) => i).sort(() => Math.random() - 0.5);
        shuffled.slice(0, count).forEach(lane => {
            const r = Math.random();
            let type = 'red';
            if (r > 0.85) type = 'green';
            else if (r > 0.65) type = 'yellow';
            gameState.obstacles.push({ lane, y: -50, type });
        });
        gameState.wavesSpawned++;
        wavesDisplay.innerText = gameState.totalWaves - gameState.wavesSpawned;
        // 终点线距离设定
        if (gameState.wavesSpawned === gameState.totalWaves) gameState.finishLineY = -400;
    }

    function update() {
        if (!gameState.isRunning) return;
        if (gameState.wavesSpawned < gameState.totalWaves) {
            const lastY = gameState.obstacles.length > 0 ? Math.min(...gameState.obstacles.map(o => o.y)) : 1000;
            if (lastY > gameState.spawnInterval) spawnWave();
        }
        const laneW = canvas.width / TOTAL_LANES;
        const playerX = (gameState.playerLane + 0.5) * laneW;
        const playerY = canvas.height * 0.85;

        for (let i = gameState.obstacles.length - 1; i >= 0; i--) {
            const o = gameState.obstacles[i];
            o.y += gameState.speed;
            const ox = (o.lane + 0.5) * laneW;
            if (Math.hypot(playerX-ox, playerY-o.y) < 26) { 
                playSound(o.type);
                if (o.type === 'red') { gameState.health -= 3; gameState.shake = 15; }
                else if (o.type === 'yellow') { gameState.health -= 1; gameState.shake = 8; }
                else { gameState.health += 1; }
                gameState.obstacles.splice(i, 1);
                updateHP();
                if (gameState.health <= 0) { gameOver(); return; }
                continue;
            }
            if (o.y > canvas.height + 100) gameState.obstacles.splice(i, 1);
        }
        if (gameState.wavesSpawned === gameState.totalWaves) {
            gameState.finishLineY += gameState.speed;
            if (gameState.finishLineY > playerY) levelComplete();
        }
        progressFill.style.width = (gameState.wavesSpawned / gameState.totalWaves * 100) + '%';
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const laneW = canvas.width / TOTAL_LANES;
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        for(let i=1; i<TOTAL_LANES; i++) {
            ctx.beginPath(); ctx.moveTo(i*laneW, 0); ctx.lineTo(i*laneW, canvas.height); ctx.stroke();
        }
        // 终点线颜色改为纯白色
        if (gameState.wavesSpawned === gameState.totalWaves) {
            ctx.fillStyle = '#ffffff'; 
            ctx.fillRect(0, gameState.finishLineY, canvas.width, 25);
        }
        ctx.fillStyle = "#ffffff";
        ctx.beginPath(); ctx.arc((gameState.playerLane + 0.5) * laneW, canvas.height * 0.85, 16, 0, Math.PI*2); ctx.fill();
        gameState.obstacles.forEach(o => {
            ctx.fillStyle = o.type === 'red' ? '#ff4444' : (o.type === 'yellow' ? '#ffb700' : '#22c55e');
            ctx.beginPath(); ctx.arc((o.lane+0.5)*laneW, o.y, 16, 0, Math.PI*2); ctx.fill();
        });
        if (gameState.shake > 0) {
            const s = (Math.random()-0.5)*gameState.shake;
            canvas.style.transform = `translate(${s}px, ${s}px)`;
            gameState.shake *= 0.9;
        } else canvas.style.transform = 'none';
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

    function showStartMessage(lvl) {
        gameState.isRunning = false;
        messageBox.style.display = 'block';
        msgProgressTag.innerText = ""; // 初始消息不需要右上角标签
        msgTitle.innerText = `第 ${lvl} / 10 关`;
        msgTitle.style.color = "var(--blue)";
        
        if (lvl === 1) {
            msgBody.innerHTML = `
                <p>左右滑动或点击按钮控制白球：</p>
                <div class="rule-item"><div class="dot" style="background:var(--red)"></div> 红色：HP -3 (致命)</div>
                <div class="rule-item"><div class="dot" style="background:var(--yellow)"></div> 黄色：HP -1</div>
                <div class="rule-item"><div class="dot" style="background:var(--green)"></div> 绿色：HP +1</div>
            `;
        } else {
            msgBody.innerText = "难度提升，保持专注！";
        }
        
        msgBtn.innerText = "开始挑战";
        msgBtn.onclick = () => {
            messageBox.style.display = 'none';
            gameState.isRunning = true;
            startBGM();
        };
    }

    function initLevel(lvl, keepHealth = false, autoStart = false) {
        initAudio(); 
        const config = levelConfigs[lvl - 1] || levelConfigs[0];
        gameState.level = lvl;
        
        if (!keepHealth) gameState.health = (lvl === 1) ? 3 : gameState.levelStartHealth;
        gameState.levelStartHealth = gameState.health;
        gameState.speed = config.speed;
        gameState.totalWaves = config.waves;
        gameState.spawnInterval = config.spawnInterval;
        gameState.wavesSpawned = 0;
        gameState.obstacles = [];
        gameState.finishLineY = -2000;
        
        levelDisplay.innerText = lvl;
        wavesDisplay.innerText = config.waves;
        updateHP();
        
        if (autoStart) {
            messageBox.style.display = 'none';
            gameState.isRunning = true;
            startBGM();
        } else {
            showStartMessage(lvl);
        }
    }

    function gameOver() {
        gameState.isRunning = false; 
        if(bgmInterval) clearInterval(bgmInterval);
        msgProgressTag.innerText = "";
        msgTitle.innerText = "挑战失败"; 
        msgTitle.style.color = "var(--red)";
        msgBody.innerText = `你在第 ${gameState.level} 关倒下了。`;
        msgBtn.innerText = "重新开始";
        messageBox.style.display = 'block';
        msgBtn.onclick = () => initLevel(1, false);
    }

    function levelComplete() {
        gameState.isRunning = false; 
        if(bgmInterval) clearInterval(bgmInterval);
        
        if (gameState.level < 10) {
            msgProgressTag.innerText = `当前进度: ${gameState.level} / 10`;
            msgTitle.innerText = "完美过关！"; 
            msgTitle.style.color = "var(--green)";
            msgBody.innerText = `准备好迎接第 ${gameState.level + 1} 关了吗？`;
            msgBtn.innerText = "进入下一关";
            messageBox.style.display = 'block';
            msgBtn.onclick = () => initLevel(gameState.level + 1, true, true);
        } else {
            msgProgressTag.innerText = "进度: 10 / 10";
            msgTitle.innerText = "全满贯！"; 
            msgTitle.style.color = "var(--finish)";
            msgBody.innerText = "你已征服全部10个关卡！";
            msgBtn.innerText = "再玩一次";
            messageBox.style.display = 'block';
            msgBtn.onclick = () => initLevel(1, false);
        }
    }

    initLevel(1, false);
    gameLoop();
</script>
</body>
</html>
