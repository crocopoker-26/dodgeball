<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>躲避球冲刺 - 音乐回归版</title>
    <style>
        :root {
            --primary: #ffffff; 
            --bg: #0f172a;    
            --finish: #fbbf24;
            --red: #ff4444;    
            --yellow: #ffb700; 
            --green: #22c55e;  
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 600px;
            background: #111827;
            display: flex;
            flex-direction: column;
            border: 2px solid #334155;
        }
        canvas {
            flex: 1;
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            font-weight: bold;
            z-index: 5;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #health-status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 5px;
        }
        #health-container {
            display: flex;
            gap: 4px;
        }
        .hp-point {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            background: var(--green);
        }

        #mobile-controls {
            display: flex;
            width: 100%;
            height: 120px;
            background: #020617;
            border-top: 2px solid #334155;
        }
        .control-btn {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            color: white;
            -webkit-user-select: none;
            user-select: none;
            cursor: pointer;
            font-weight: bold;
        }
        .control-btn:active {
            background: #1e293b;
        }

        #message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e293b;
            border: 4px solid white;
            padding: 20px;
            text-align: center;
            display: none;
            z-index: 100;
            width: 85%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            background: white;
            color: black;
            border: none;
            padding: 12px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }
        button:active { background: #cbd5e1; }
        button:disabled { background: #475569; color: #94a3b8; }
        button.secondary { background: transparent; color: white; border: 2px solid white; }

        #leaderboard {
            margin-top: 20px;
            text-align: left;
            font-size: 0.9rem;
            border-top: 1px solid #475569;
            padding-top: 10px;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        #name-input-container {
            margin: 15px 0;
            display: none;
        }
        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            background: #0f172a;
            border: 1px solid #475569;
            color: white;
            text-align: center;
            margin-bottom: 10px;
        }

        .progress-bar {
            position: absolute;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            height: 10px;
            background: #020617;
            border: 2px solid #475569;
        }
        #progress-fill { 
            width: 0%; 
            height: 100%; 
            background: #3b82f6;
        }
        #db-status { font-size: 0.6rem; color: #64748b; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-overlay">
        <div>
            <div style="font-size: 0.8rem; color: #94a3b8;">当前关卡</div>
            <div id="level-val" style="font-size: 1.5rem;">1</div>
            <div id="health-status">
                <span id="health-num">3</span>
                <div id="health-container"></div>
            </div>
        </div>
        <div style="text-align: right">
            <div style="font-size: 0.8rem; color: #94a3b8;">剩余波数</div>
            <div id="waves-val" style="font-size: 1.5rem;">10</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="progress-bar">
        <div id="progress-fill"></div>
    </div>

    <div id="mobile-controls">
        <div class="control-btn" id="btn-left">左 移</div>
        <div class="control-btn" id="btn-right">右 移</div>
    </div>

    <div id="message-box">
        <h2 id="msg-title" style="margin-top:0;">躲避球冲刺</h2>
        <p id="msg-body">躲避红色和黄色，收集绿色！</p>
        
        <div id="name-input-container">
            <p>恭喜全通关！输入你的大名进入排行榜：</p>
            <input type="text" id="player-name" maxlength="10" placeholder="你的名字">
            <button id="submit-score-btn">提交分数</button>
        </div>

        <div id="main-actions" class="btn-group">
            <button id="msg-btn">开始游戏</button>
            <button id="select-btn" class="secondary">选择关卡</button>
        </div>
        
        <div id="leaderboard">
            <h3 style="margin: 0 0 10px 0; text-align: center;">全球排行榜 (前十)</h3>
            <div id="leaderboard-list">正在连接服务器...</div>
            <div id="db-status"></div>
        </div>

        <div id="level-select" style="display:none; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 15px;"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- 初始化 Firebase ---
    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'dodgeball-music-final';

    let user = null;
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const levelDisplay = document.getElementById('level-val');
    const wavesDisplay = document.getElementById('waves-val');
    const progressFill = document.getElementById('progress-fill');
    const healthNumDisplay = document.getElementById('health-num');
    const healthContainer = document.getElementById('health-container');
    const messageBox = document.getElementById('message-box');
    const msgTitle = document.getElementById('msg-title');
    const msgBody = document.getElementById('msg-body');
    const msgBtn = document.getElementById('msg-btn');
    const selectBtn = document.getElementById('select-btn');
    const mainActions = document.getElementById('main-actions');
    const nameInputContainer = document.getElementById('name-input-container');
    const playerNameInput = document.getElementById('player-name');
    const submitScoreBtn = document.getElementById('submit-score-btn');
    const leaderboardList = document.getElementById('leaderboard-list');
    const dbStatus = document.getElementById('db-status');

    let audioCtx = null;
    let bgmInterval = null;
    const TOTAL_LANES = 10;
    
    let gameState = {
        level: 1,
        playerLane: 4, 
        health: 3, 
        levelStartHealth: 3,
        speed: 2.2,
        isRunning: false,
        obstacles: [],
        spawnInterval: 500, 
        wavesSpawned: 0,
        totalWaves: 10,
        finishLineY: -2000,
        shake: 0
    };

    const levelConfigs = [
        { speed: 3.0, waves: 10, spawnInterval: 480 },
        { speed: 3.6, waves: 15, spawnInterval: 470 },
        { speed: 4.2, waves: 20, spawnInterval: 460 },
        { speed: 4.8, waves: 25, spawnInterval: 450 },
        { speed: 5.4, waves: 30, spawnInterval: 440 },
        { speed: 6.0, waves: 35, spawnInterval: 430 },
        { speed: 6.6, waves: 40, spawnInterval: 420 },
        { speed: 7.2, waves: 45, spawnInterval: 410 },
        { speed: 7.8, waves: 50, spawnInterval: 400 },
        { speed: 8.8, waves: 60, spawnInterval: 390 }
    ];

    // 立即显示主界面，不等待认证
    window.onload = () => {
        resize();
        updateHealthUI();
        messageBox.style.display = 'block';
        requestAnimationFrame(gameLoop);
    };

    // 异步认证
    const initAuth = async () => {
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        } catch (error) {
            dbStatus.innerText = '认证中...';
        }
    };

    onAuthStateChanged(auth, u => {
        user = u;
        if (user) {
            dbStatus.innerText = '服务器已就绪';
            loadLeaderboard();
        }
    });

    initAuth();

    function loadLeaderboard() {
        if (!user) return;
        const scoresRef = collection(db, 'artifacts', appId, 'public', 'data', 'scores');
        onSnapshot(scoresRef, (snapshot) => {
            const scores = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                if (data && typeof data.score === 'number') scores.push(data);
            });
            scores.sort((a, b) => b.score - a.score);
            const top10 = scores.slice(0, 10);
            leaderboardList.innerHTML = top10.length ? '' : '暂无记录';
            top10.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'leaderboard-item';
                div.innerHTML = `<span>${index + 1}. ${item.name || '匿名'}</span><span>${item.score}</span>`;
                leaderboardList.appendChild(div);
            });
        }, (err) => {
            leaderboardList.innerHTML = '排行榜暂不可用';
        });
    }

    async function submitScore() {
        if (!user) return;
        const name = playerNameInput.value.trim() || "匿名玩家";
        const score = gameState.health;
        try {
            submitScoreBtn.disabled = true;
            submitScoreBtn.innerText = "提交中...";
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'scores'), {
                name,
                score,
                timestamp: serverTimestamp(),
                uid: user.uid
            });
            location.reload(); 
        } catch (e) {
            submitScoreBtn.disabled = false;
            submitScoreBtn.innerText = "提交失败";
        }
    }

    submitScoreBtn.onclick = submitScore;

    function startBGM() {
        if (bgmInterval) clearInterval(bgmInterval);
        if (!audioCtx) return;
        const freqs = [261.63, 329.63, 392.00, 440.00, 523.25];
        function playNote() {
            if (!gameState.isRunning) return;
            const freq = freqs[Math.floor(Math.random() * freqs.length)];
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(0, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 0.5);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.0);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 2.0);
        }
        playNote();
        bgmInterval = setInterval(playNote, 1200);
    }

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const g = audioCtx.createGain(); g.connect(audioCtx.destination);
        const osc = audioCtx.createOscillator();
        if (type === 'red') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(120, now);
            g.gain.setValueAtTime(0.3, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(); osc.stop(now + 0.3);
        } else if (type === 'yellow') {
            osc.frequency.setValueAtTime(300, now);
            g.gain.setValueAtTime(0.1, now); g.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(); osc.stop(now + 0.1);
        } else if (type === 'green') {
            osc.frequency.setValueAtTime(500, now);
            g.gain.setValueAtTime(0.2, now); g.gain.linearRampToValueAtTime(0, now + 0.15);
            osc.start(); osc.stop(now + 0.15);
        }
        osc.connect(g);
    }

    function moveLeft() { if (gameState.playerLane > 0) gameState.playerLane--; }
    function moveRight() { if (gameState.playerLane < TOTAL_LANES - 1) gameState.playerLane++; }

    document.getElementById('btn-left').onpointerdown = (e) => { e.preventDefault(); initAudio(); moveLeft(); };
    document.getElementById('btn-right').onpointerdown = (e) => { e.preventDefault(); initAudio(); moveRight(); };

    window.addEventListener('keydown', (e) => {
        if (!gameState.isRunning) return;
        initAudio();
        if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') moveLeft();
        else if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') moveRight();
    });

    function updateHealthUI() {
        healthNumDisplay.innerText = gameState.health;
        healthContainer.innerHTML = '';
        for(let i=0; i<Math.min(gameState.health, 10); i++) {
            const d = document.createElement('div');
            d.className = 'hp-point';
            if (gameState.health <= 1) d.style.background = 'var(--red)';
            healthContainer.appendChild(d);
        }
    }

    function resize() { 
        canvas.width = canvas.clientWidth; 
        canvas.height = canvas.clientHeight; 
    }
    window.addEventListener('resize', resize);

    function spawnWave() {
        if (gameState.wavesSpawned >= gameState.totalWaves) return;
        let count = 5;
        if (gameState.level >= 4 && gameState.level <= 8) count = 6;
        else if (gameState.level >= 9) count = 7;

        const shuffled = Array.from({length: TOTAL_LANES}, (_, i) => i).sort(() => Math.random() - 0.5);
        shuffled.slice(0, count).forEach(lane => {
            const r = Math.random();
            let type = 'red';
            if (r > 0.80) type = 'green';
            else if (r > 0.65) type = 'yellow';
            gameState.obstacles.push({ lane, y: -50, type });
        });
        gameState.wavesSpawned++;
        wavesDisplay.innerText = gameState.totalWaves - gameState.wavesSpawned;
        if (gameState.wavesSpawned === gameState.totalWaves) gameState.finishLineY = -1000;
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function update() {
        if (!gameState.isRunning) return;
        if (gameState.wavesSpawned < gameState.totalWaves) {
            const lastY = gameState.obstacles.length > 0 ? Math.min(...gameState.obstacles.map(o => o.y)) : 1000;
            if (lastY > gameState.spawnInterval) spawnWave();
        }
        const laneW = canvas.width / TOTAL_LANES;
        const playerX = (gameState.playerLane + 0.5) * laneW;
        const playerY = canvas.height * 0.85;

        for (let i = gameState.obstacles.length - 1; i >= 0; i--) {
            const o = gameState.obstacles[i];
            o.y += gameState.speed;
            const ox = (o.lane + 0.5) * laneW;
            if (Math.hypot(playerX-ox, playerY-o.y) < 26) { 
                playSound(o.type);
                if (o.type === 'red') { gameState.health -= 3; gameState.shake = 15; }
                else if (o.type === 'yellow') { gameState.health -= 1; gameState.shake = 8; }
                else { gameState.health += 1; }
                gameState.obstacles.splice(i, 1);
                updateHealthUI();
                if (gameState.health <= 0) { gameOver(); return; }
                continue;
            }
            if (o.y > canvas.height + 100) gameState.obstacles.splice(i, 1);
        }
        if (gameState.wavesSpawned === gameState.totalWaves) {
            gameState.finishLineY += gameState.speed;
            if (gameState.finishLineY > playerY) levelComplete();
        }
        progressFill.style.width = (gameState.wavesSpawned / gameState.totalWaves * 100) + '%';
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const laneW = canvas.width / TOTAL_LANES;
        
        // 绘制车道线
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        for(let i=1; i<TOTAL_LANES; i++) {
            ctx.beginPath(); ctx.moveTo(i*laneW, 0); ctx.lineTo(i*laneW, canvas.height); ctx.stroke();
        }
        
        // 绘制终点线
        if (gameState.wavesSpawned === gameState.totalWaves) {
            ctx.fillStyle = 'var(--finish)'; ctx.fillRect(0, gameState.finishLineY, canvas.width, 25);
        }
        
        // 绘制玩家
        ctx.fillStyle = "#ffffff";
        ctx.beginPath(); ctx.arc((gameState.playerLane + 0.5) * laneW, canvas.height * 0.85, 16, 0, Math.PI*2); ctx.fill();

        // 绘制障碍物
        gameState.obstacles.forEach(o => {
            ctx.fillStyle = o.type === 'red' ? '#ff4444' : (o.type === 'yellow' ? '#ffb700' : '#22c55e');
            ctx.beginPath(); ctx.arc((o.lane+0.5)*laneW, o.y, 16, 0, Math.PI*2); ctx.fill();
        });
        
        // 屏幕震动
        if (gameState.shake > 0) {
            const s = (Math.random()-0.5)*gameState.shake;
            canvas.style.transform = `translate(${s}px, ${s}px)`;
            gameState.shake *= 0.9;
        } else canvas.style.transform = 'none';
    }

    function initLevel(lvl, keepHealth = false) {
        initAudio();
        const config = levelConfigs[lvl - 1] || levelConfigs[0];
        gameState.level = lvl;
        if (!keepHealth) gameState.health = (lvl === 1) ? 3 : gameState.levelStartHealth;
        gameState.levelStartHealth = gameState.health;
        gameState.speed = config.speed;
        gameState.totalWaves = config.waves;
        gameState.spawnInterval = config.spawnInterval;
        gameState.wavesSpawned = 0;
        gameState.obstacles = [];
        gameState.finishLineY = -2000;
        gameState.isRunning = true;
        levelDisplay.innerText = lvl;
        wavesDisplay.innerText = config.waves;
        updateHealthUI();
        messageBox.style.display = 'none';
        startBGM();
    }

    function gameOver() {
        gameState.isRunning = false; if(bgmInterval) clearInterval(bgmInterval);
        msgTitle.innerText = "游戏结束"; msgTitle.style.color = "var(--red)";
        msgBody.innerText = `你在第 ${gameState.level} 关倒下了。`;
        msgBtn.innerText = "重新挑战";
        messageBox.style.display = 'block';
        msgBtn.onclick = () => initLevel(1, false);
    }

    function levelComplete() {
        gameState.isRunning = false; if(bgmInterval) clearInterval(bgmInterval);
        if (gameState.level < 10) {
            msgTitle.innerText = "挑战成功！"; msgTitle.style.color = "var(--green)";
            msgBody.innerText = `进入第 ${gameState.level + 1} 关。`;
            msgBtn.innerText = "下一关";
            messageBox.style.display = 'block';
            msgBtn.onclick = () => initLevel(gameState.level+1, true);
        } else {
            msgTitle.innerText = "全关卡达成！"; msgTitle.style.color = "var(--finish)";
            msgBody.innerText = "你是真正的躲避大师！";
            nameInputContainer.style.display = 'block';
            mainActions.style.display = 'none';
            messageBox.style.display = 'block';
        }
    }

    const levelSelectDiv = document.getElementById('level-select');
    selectBtn.onclick = () => {
        mainActions.style.display = 'none';
        levelSelectDiv.style.display = 'grid';
        levelSelectDiv.innerHTML = '';
        for(let i=1; i<=10; i++) {
            const b = document.createElement('button');
            b.innerText = i;
            b.style.background = "transparent"; b.style.color="white"; b.style.border="1px solid white";
            b.onclick = () => { initLevel(i, false); };
            levelSelectDiv.appendChild(b);
        }
        const bk = document.createElement('button');
        bk.innerText = "返回"; bk.style.gridColumn = "span 5";
        bk.onclick = () => { mainActions.style.display = 'flex'; levelSelectDiv.style.display = 'none'; };
        levelSelectDiv.appendChild(bk);
    };

    msgBtn.onclick = () => { initAudio(); initLevel(1, false); };
</script>
</body>
</html>
