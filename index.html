<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>躲避球冲刺 - 排行榜正式版</title>
    <style>
        :root { --primary: #ffffff; --bg: #0f172a; --finish: #fbbf24; --red: #ff4444; --yellow: #ffb700; --green: #22c55e; }
        body { margin: 0; padding: 0; overflow: hidden; background-color: var(--bg); font-family: sans-serif; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none; }
        #game-container { position: relative; width: 100%; height: 100%; max-width: 600px; background: #111827; display: flex; flex-direction: column; border: 2px solid #334155; }
        canvas { flex: 1; display: block; width: 100%; height: 100%; }
        #ui-overlay { position: absolute; top: 20px; left: 0; right: 0; pointer-events: none; display: flex; justify-content: space-between; padding: 0 20px; font-weight: bold; z-index: 5; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        #health-status { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
        #mobile-controls { display: flex; width: 100%; height: 120px; background: #020617; border-top: 2px solid #334155; }
        .control-btn { flex: 1; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; color: white; -webkit-user-select: none; user-select: none; cursor: pointer; font-weight: bold; }
        .control-btn:active { background: #1e293b; }
        #message-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e293b; border: 4px solid white; padding: 20px; text-align: center; display: none; z-index: 100; width: 85%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        button { background: white; color: black; border: none; padding: 12px; font-size: 1rem; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        input { width: 100%; padding: 10px; box-sizing: border-box; background: #0f172a; border: 1px solid #475569; color: white; text-align: center; margin-bottom: 10px; }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .progress-bar { position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%); width: 85%; height: 8px; background: #020617; border: 1px solid #475569; }
        #progress-fill { width: 0%; height: 100%; background: #3b82f6; transition: width 0.3s; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-overlay">
        <div>
            <div style="font-size: 0.7rem; color: #94a3b8;">关卡 <span id="level-val">1</span></div>
            <div id="health-status"><span id="health-num">3</span> HP</div>
        </div>
        <div style="text-align: right">
            <div style="font-size: 0.7rem; color: #94a3b8;">剩余波数</div>
            <div id="waves-val" style="font-size: 1.2rem;">5</div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <div id="mobile-controls">
        <div class="control-btn" id="btn-left">左 移</div>
        <div class="control-btn" id="btn-right">右 移</div>
    </div>
    <div id="message-box">
        <h2 id="msg-title">躲避球冲刺</h2>
        <p id="msg-body">每点血量 = 1分</p>
        
        <div id="name-input-container" style="display:none;">
            <input type="text" id="player-name" maxlength="10" placeholder="输入大名">
            <button id="submit-score-btn">提交成绩</button>
        </div>
        <div id="main-actions">
            <button id="msg-btn">开始挑战</button>
        </div>
        <div id="leaderboard" style="margin-top:15px; text-align:left; border-top:1px solid #444; padding-top:10px;">
            <div style="text-align:center; font-weight:bold; margin-bottom:5px;">排行榜</div>
            <div id="leaderboard-list">正在连接排行榜...</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp, query, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // Firebase 配置
    const firebaseConfig = {
        apiKey: "AIzaSyDNNJIp1Gq0FUx3KANjZs06XL-riomGyDI",
        authDomain: "dodgeball-e6c6d.firebaseapp.com",
        projectId: "dodgeball-e6c6d",
        storageBucket: "dodgeball-e6c6d.firebasestorage.app",
        messagingSenderId: "800218391",
        appId: "1:800218391:web:a4b11c500878e5f12b52",
        measurementId: "G-7G53JGSGRV"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = "dodgeball-game-final";

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const levelDisplay = document.getElementById('level-val');
    const wavesDisplay = document.getElementById('waves-val');
    const progressFill = document.getElementById('progress-fill');
    const healthNum = document.getElementById('health-num');
    const messageBox = document.getElementById('message-box');
    const msgTitle = document.getElementById('msg-title');
    const msgBody = document.getElementById('msg-body');
    const msgBtn = document.getElementById('msg-btn');
    const leaderboardList = document.getElementById('leaderboard-list');
    const nameInputContainer = document.getElementById('name-input-container');
    const playerNameInput = document.getElementById('player-name');
    const submitBtn = document.getElementById('submit-score-btn');

    // --- 音效系统 (Web Audio API) ---
    let audioCtx = null;
    function playSound(type) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        const now = audioCtx.currentTime;
        if (type === 'hit') { // 撞击红球/黄球
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.2);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.2);
            osc.start(); osc.stop(now + 0.2);
        } else if (type === 'score') { // 吃绿球
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(); osc.stop(now + 0.1);
        } else if (type === 'win') { // 过关
            osc.frequency.setValueAtTime(523.25, now); // C5
            osc.frequency.setValueAtTime(659.25, now + 0.1); // E5
            osc.frequency.setValueAtTime(783.99, now + 0.2); // G5
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.start(); osc.stop(now + 0.4);
        } else if (type === 'lose') { // 死亡
            osc.type = 'square';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.linearRampToValueAtTime(50, now + 0.5);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.5);
            osc.start(); osc.stop(now + 0.5);
        }
    }

    let user = null;
    let gameState = { level: 1, playerLane: 4, health: 3, isRunning: false, obstacles: [], wavesSpawned: 0, totalWaves: 5, speed: 3 };

    // 匿名登录
    async function initFirebase() {
        try {
            const u = await signInAnonymously(auth);
            user = u.user;
            setupLeaderboardListener();
        } catch (err) {
            console.error("Firebase 登录失败:", err);
            if (err.code === 'auth/admin-restricted-operation') {
                leaderboardList.innerHTML = "<span style='color:#f87171'>错误：请在 Firebase 控制台开启 'Anonymous' 登录方式</span>";
            } else {
                leaderboardList.innerHTML = "连接失败，请检查网络";
            }
        }
    }

    function setupLeaderboardListener() {
        const q = collection(db, 'artifacts', appId, 'public', 'data', 'scores');
        onSnapshot(q, (snap) => {
            const data = [];
            snap.forEach(doc => data.push(doc.data()));
            data.sort((a,b) => b.score - a.score);
            leaderboardList.innerHTML = data.slice(0, 5).map((s, i) => 
                `<div class="leaderboard-item"><span>${i+1}. ${s.name}</span><span>${s.score}分</span></div>`).join('') || "暂无记录";
        }, (err) => {
            console.error("数据同步失败:", err);
            leaderboardList.innerHTML = "排行榜权限受阻";
        });
    }

    initFirebase();

    submitBtn.onclick = async () => {
        if (!user) {
            msgBody.innerText = "未登录，无法提交";
            return;
        }
        const name = playerNameInput.value.trim() || "无名氏";
        try {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'scores'), {
                name, score: gameState.health, timestamp: serverTimestamp()
            });
            nameInputContainer.style.display = 'none';
            msgBody.innerText = "成绩已提交！";
        } catch (e) {
            msgBody.innerText = "提交失败，请检查数据库 Rules";
        }
    };

    function resize() { canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; }
    window.onresize = resize; resize();

    function moveLeft() { if(gameState.playerLane > 0) gameState.playerLane--; }
    function moveRight() { if(gameState.playerLane < 9) gameState.playerLane++; }

    window.addEventListener('keydown', (e) => {
        if (!gameState.isRunning) return;
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') moveLeft();
        else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') moveRight();
    });

    function spawn() {
        if (gameState.wavesSpawned >= gameState.totalWaves) return;
        const laneCount = (gameState.level < 4) ? 5 : (gameState.level < 9 ? 6 : 7);
        const lanes = Array.from({length: 10}, (_, i) => i).sort(() => Math.random()-0.5).slice(0, laneCount);
        lanes.forEach(lane => {
            let type = 'red'; const r = Math.random();
            if (r > 0.75) type = 'green'; else if (r > 0.6) type = 'yellow';
            gameState.obstacles.push({ lane, y: -50, type });
        });
        gameState.wavesSpawned++;
        wavesDisplay.innerText = gameState.totalWaves - gameState.wavesSpawned;
        progressFill.style.width = (gameState.wavesSpawned / gameState.totalWaves * 100) + '%';
    }

    function update() {
        if (!gameState.isRunning) return;
        const lastY = gameState.obstacles.length ? Math.min(...gameState.obstacles.map(o => o.y)) : 999;
        if (lastY > 400) spawn();

        const lw = canvas.width / 10;
        const px = (gameState.playerLane + 0.5) * lw;
        const py = canvas.height * 0.85;

        for (let i = gameState.obstacles.length-1; i>=0; i--) {
            const o = gameState.obstacles[i]; o.y += gameState.speed;
            const ox = (o.lane + 0.5) * lw;
            if (Math.hypot(px-ox, py-o.y) < 25) {
                if (o.type === 'red') {
                    gameState.health -= 3;
                    playSound('hit');
                } else if (o.type === 'yellow') {
                    gameState.health -= 1;
                    playSound('hit');
                } else {
                    gameState.health += 1;
                    playSound('score');
                }
                gameState.obstacles.splice(i, 1);
                healthNum.innerText = gameState.health;
                if (gameState.health <= 0) {
                    gameState.isRunning = false; 
                    playSound('lose');
                    msgTitle.innerText = "游戏结束";
                    msgBody.innerText = "别灰心，再来一次！"; messageBox.style.display = 'block';
                }
            }
            if (o.y > canvas.height + 50) gameState.obstacles.splice(i, 1);
        }

        if (gameState.wavesSpawned >= gameState.totalWaves && gameState.obstacles.length === 0) {
            if (gameState.level < 10) {
                gameState.isRunning = false; gameState.level++;
                playSound('win');
                msgTitle.innerText = "过关啦！"; msgBody.innerText = "准备进入下一关";
                msgBtn.innerText = "继续"; messageBox.style.display = 'block';
            } else {
                gameState.isRunning = false; 
                playSound('win');
                msgTitle.innerText = "终极通关！";
                msgBody.innerText = `最终得分: ${gameState.health}分`;
                nameInputContainer.style.display = 'block'; 
                document.getElementById('main-actions').style.display='none';
                messageBox.style.display = 'block';
            }
        }
    }

    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        const lw = canvas.width/10;
        ctx.strokeStyle = '#222'; for(let i=1; i<10; i++){ ctx.beginPath(); ctx.moveTo(i*lw,0); ctx.lineTo(i*lw,canvas.height); ctx.stroke(); }
        ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc((gameState.playerLane+0.5)*lw, canvas.height*0.85, 15, 0, Math.PI*2); ctx.fill();
        gameState.obstacles.forEach(o => {
            ctx.fillStyle = o.type === 'red' ? '#ff4444' : (o.type === 'yellow' ? '#ffb700' : '#22c55e');
            ctx.beginPath(); ctx.arc((o.lane+0.5)*lw, o.y, 15, 0, Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(() => { update(); draw(); });
    }

    function start(lvl = 1) {
        // 激活音频上下文 (由于浏览器限制，必须由用户点击触发)
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        gameState = { level: lvl, playerLane: 4, health: (lvl===1?3:gameState.health), isRunning: true, obstacles: [], wavesSpawned: 0, totalWaves: 5 + lvl*5, speed: 2 + lvl*0.6 };
        levelDisplay.innerText = lvl; healthNum.innerText = gameState.health;
        messageBox.style.display = 'none';
        document.getElementById('main-actions').style.display='block';
    }

    msgBtn.onclick = () => start(gameState.level);
    document.getElementById('btn-left').onpointerdown = moveLeft;
    document.getElementById('btn-right').onpointerdown = moveRight;
    
    messageBox.style.display = 'block'; draw();
</script>
</body>
</html>
